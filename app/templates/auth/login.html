<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - JISU裁判系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --border: #334155;
            --gradient-from: #0f172a;
            --gradient-mid: #1e293b;
            --glass-bg: rgba(30, 41, 59, 0.7);
        }
        [data-theme="light"] {
            --bg-primary: #f1f5f9;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #cbd5e1;
            --gradient-from: #f1f5f9;
            --gradient-mid: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.75);
        }
        body { background: var(--bg-primary); }
        .glass { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.15); }
        #theme-toggle-btn { position: fixed; top: 1rem; right: 1rem; z-index: 50; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-cover bg-center bg-no-repeat p-4" id="login-body" style="background-image: linear-gradient(135deg, var(--gradient-from) 0%, var(--gradient-mid) 50%, var(--gradient-from) 100%);">

    <!-- 主题切换 -->
    <button onclick="toggleTheme()" id="theme-toggle-btn"
        class="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-slate-800/40 hover:bg-slate-700/50 text-slate-300 text-sm transition-colors backdrop-blur">
        <svg id="theme-icon-light" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg id="theme-icon-dark" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        <span id="theme-label">浅色</span>
    </button>

    <div class="glass rounded-2xl p-8 w-full max-w-sm shadow-2xl">
        <div class="text-center mb-6">
            <img src="/static/emblem.webp" alt="校徽" class="w-16 h-16 mx-auto rounded-xl mb-3" style="object-fit:contain">
            <h1 class="text-xl font-bold text-[var(--text-primary)]">JISU程序设计裁判系统</h1>
            <p class="text-sm text-[var(--text-muted)] mt-1">吉林外国语大学 ACM 集训队</p>
        </div>
        {% if error %}
        <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-2.5 rounded-lg mb-4 text-sm">{{ error }}</div>
        {% endif %}
        <form method="post" action="/auth/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-[var(--text-secondary)] mb-1">用户名</label>
                <input type="text" name="username" required autofocus
                    class="w-full bg-slate-800/50 border border-[var(--border)] rounded-lg px-4 py-2.5 text-[var(--text-primary)] text-sm focus:ring-2 focus:ring-[var(--accent)] focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-[var(--text-secondary)] mb-1">密码</label>
                <input type="password" name="password" required
                    class="w-full bg-slate-800/50 border border-[var(--border)] rounded-lg px-4 py-2.5 text-[var(--text-primary)] text-sm focus:ring-2 focus:ring-[var(--accent)] focus:border-transparent outline-none transition-all">
            </div>
            <button type="submit"
                class="w-full bg-[var(--accent)] hover:bg-[var(--accent-hover)] text-white font-medium py-2.5 rounded-lg transition-colors">
                登录
            </button>
        </form>
        <div class="mt-5 pt-4 border-t border-[var(--border)]">
            <a href="https://stevenjisu.github.io/" target="_blank"
                class="block w-full text-center bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm">
                吉林外国语大学人工智能学院竞赛
            </a>
        </div>
    </div>

    <script>
    // 主题切换
    (function() {
        const html = document.documentElement;
        const saved = localStorage.getItem('theme');
        if (saved) { html.setAttribute('data-theme', saved); }
        else if (window.matchMedia('(prefers-color-scheme: light)').matches) { html.setAttribute('data-theme', 'light'); }
        updateIcons();
    })();
    function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcons();
    }
    function updateIcons() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.getElementById('theme-icon-dark').style.display = isDark ? 'none' : '';
        document.getElementById('theme-icon-light').style.display = isDark ? '' : 'none';
        document.getElementById('theme-label').textContent = isDark ? '浅色' : '深色';
    }
    // 随机背景图
    const photos = {{ photos | tojson }};
    if (photos.length > 0) {
        const pick = photos[Math.floor(Math.random() * photos.length)];
        document.getElementById('login-body').style.backgroundImage = `url('/static/photos/${pick}')`;
    }
    </script>
</body>
</html>
