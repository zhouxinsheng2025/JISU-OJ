{% extends "base.html" %}
{% block title %}裁判后台 - {{ "编辑比赛" if contest else "新建比赛" }}{% endblock %}
{% block nav %}
<a href="/jury/" class="hover:text-blue-400">仪表盘</a>
<a href="/jury/contests" class="text-blue-400 font-semibold">比赛</a>
<a href="/jury/teams" class="hover:text-blue-400">队伍</a>
<a href="/jury/submissions" class="hover:text-blue-400">提交</a>
<a href="/jury/clarifications" class="hover:text-blue-400">问答</a>
<a href="/jury/scoreboard" class="hover:text-blue-400">计分板</a>
{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{{ "编辑比赛" if contest else "新建比赛" }}</h1>

<div class="bg-gray-800 rounded-lg p-6 max-w-lg">
    <form method="post" action="{{ '/jury/contests/' ~ contest.id ~ '/edit' if contest else '/jury/contests/new' }}">
        <div class="mb-4">
            <label class="block text-gray-300 mb-1">标题</label>
            <input type="text" name="title" required
                   value="{{ contest.title if contest else '' }}"
                   class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
        </div>

        <div class="mb-4">
            <label class="block text-gray-300 mb-1">开始时间</label>
            <input type="datetime-local" name="start_time" required
                   value="{{ contest.start_time.strftime('%Y-%m-%dT%H:%M') if contest else '' }}"
                   class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
        </div>

        <div class="mb-4">
            <label class="block text-gray-300 mb-1">结束时间</label>
            <input type="datetime-local" name="end_time" required
                   value="{{ contest.end_time.strftime('%Y-%m-%dT%H:%M') if contest else '' }}"
                   class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
        </div>

        <div class="mb-4">
            <label class="block text-gray-300 mb-1">计分模式</label>
            <select name="score_mode"
                    class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                <option value="icpc" {% if contest and (contest.score_mode.value == "icpc" or contest.score_mode == "icpc") %}selected{% endif %}>ICPC</option>
                <option value="ioi" {% if contest and (contest.score_mode.value == "ioi" or contest.score_mode == "ioi") %}selected{% endif %}>IOI</option>
            </select>
        </div>

        <div class="mb-6">
            <label class="block text-gray-300 mb-1">封榜时间（可选）</label>
            <input type="datetime-local" name="freeze_time"
                   value="{{ contest.freeze_time.strftime('%Y-%m-%dT%H:%M') if contest and contest.freeze_time else '' }}"
                   class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
        </div>

        <div class="flex gap-3">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">
                {{ "保存修改" if contest else "创建比赛" }}
            </button>
            <a href="/jury/contests" class="bg-gray-600 hover:bg-gray-500 text-white px-6 py-2 rounded-lg transition text-center">
                取消
            </a>
        </div>
    </form>
</div>
{% endblock %}
